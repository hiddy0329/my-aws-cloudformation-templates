AWSTemplateFormatVersion: '2010-09-09'
Description: 'Uranai API Infrastructure with ALB and Auto Scaling'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'
    Description: Latest Amazon Linux 2023 AMI ID

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: UranaiVPC

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: UranaiIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets (for ALB)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: UranaiPublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: UranaiPublicSubnet2

  # Private Subnets (for EC2 instances)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: UranaiPrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: UranaiPrivateSubnet2

  # Elastic IP for NAT Gateway
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: UranaiNatGatewayEIP

  # NAT Gateway (for outbound internet access from private subnets)
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: UranaiNatGateway

  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: UranaiPublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Private Route Table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: UranaiPrivateRouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Security Group for ALB
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: UranaiALBSecurityGroup
      GroupDescription: Security group for Application Load Balancer
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: UranaiALBSecurityGroup

  # Security Group for EC2 instances
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: UranaiEC2SecurityGroup
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTP from ALB only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic for software installation
      Tags:
        - Key: Name
          Value: UranaiEC2SecurityGroup

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: UranaiALB
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: UranaiALB

  # Target Group
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: UranaiTargetGroup
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Tags:
        - Key: Name
          Value: UranaiTargetGroup

  # ALB Listener
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  # IAM Role for EC2 instances
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UranaiEC2Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: UranaiEC2Role

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: UranaiEC2InstanceProfile
      Roles:
        - !Ref EC2Role

  # Launch Template
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: UranaiLaunchTemplate
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            # Update system
            dnf update -y

            # Install Go and Git
            dnf install -y golang git stress-ng

            # Set Go environment variables
            export HOME=/root
            export GOPATH=/root/go
            export GOMODCACHE=/root/go/pkg/mod
            export PATH=$PATH:/usr/local/go/bin:$GOPATH/bin

            # Create app directory
            mkdir -p /opt/api
            cd /opt/api

            # Get instance metadata (for hostname endpoint)
            TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null)
            INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null)

            # Create the Uranai API application
            cat > main.go << 'GOEOF'
            package main

            import (
                "encoding/json"
                "fmt"
                "log"
                "math/rand"
                "net/http"
                "os"
                "os/exec"
                "time"
            )

            type UranaiResult struct {
                Result  string `json:"result"`
                Message string `json:"message"`
            }

            type HostnameResult struct {
                Hostname string `json:"hostname"`
            }

            type HealthResult struct {
                Status string `json:"status"`
            }

            type StressResult struct {
                Message string `json:"message"`
            }

            var UranaiList = []UranaiResult{
                {Result: "大吉", Message: "すべてがうまくいく最高の運勢です！"},
                {Result: "中吉", Message: "良いことが起こりそうな予感です。"},
                {Result: "小吉", Message: "小さな幸せが訪れるでしょう。"},
                {Result: "吉", Message: "穏やかな一日になりそうです。"},
                {Result: "末吉", Message: "努力が実を結ぶ兆しがあります。"},
                {Result: "凶", Message: "慎重に行動することをお勧めします。"},
                {Result: "大凶", Message: "今日は控えめに過ごしましょう。"},
            }

            func UranaiHandler(w http.ResponseWriter, r *http.Request) {
                rand.Seed(time.Now().UnixNano())
                result := UranaiList[rand.Intn(len(UranaiList))]

                w.Header().Set("Content-Type", "application/json")
                json.NewEncoder(w).Encode(result)
            }

            func hostnameHandler(w http.ResponseWriter, r *http.Request) {
                hostname := os.Getenv("INSTANCE_ID")
                if hostname == "" {
                    hostname, _ = os.Hostname()
                }

                result := HostnameResult{Hostname: hostname}
                w.Header().Set("Content-Type", "application/json")
                json.NewEncoder(w).Encode(result)
            }

            func healthHandler(w http.ResponseWriter, r *http.Request) {
                result := HealthResult{Status: "healthy"}
                w.Header().Set("Content-Type", "application/json")
                json.NewEncoder(w).Encode(result)
            }

            func stressHandler(w http.ResponseWriter, r *http.Request) {
                go func() {
                    cmd := exec.Command("stress-ng", "--cpu", "1", "--timeout", "60s")
                    cmd.Run()
                }()

                result := StressResult{Message: "CPU stress test started for 60 seconds"}
                w.Header().Set("Content-Type", "application/json")
                json.NewEncoder(w).Encode(result)
            }

            func main() {
                http.HandleFunc("/Uranai", UranaiHandler)
                http.HandleFunc("/hostname", hostnameHandler)
                http.HandleFunc("/health", healthHandler)
                http.HandleFunc("/stress", stressHandler)

                fmt.Println("Starting Uranai API server on port 80...")
                log.Fatal(http.ListenAndServe(":80", nil))
            }
            GOEOF

            # Initialize Go module
            go mod init Uranai-api
            go mod tidy

            # Build the application
            go build -o Uranai-api main.go

            # Create systemd service
            cat > /etc/systemd/system/Uranai-api.service << SERVICEEOF
            [Unit]
            Description=Uranai API Server
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/api
            Environment="INSTANCE_ID=$INSTANCE_ID"
            ExecStart=/opt/api/Uranai-api
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            # Enable and start service
            systemctl daemon-reload
            systemctl enable Uranai-api
            systemctl start Uranai-api
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: UranaiAPIServer

  # Auto Scaling Group
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: UranaiASG
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref TargetGroup
      Tags:
        - Key: Name
          Value: UranaiAPIServer
          PropagateAtLaunch: true

  # Auto Scaling Policy - Scale Out
  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

Outputs:
  LoadBalancerDNS:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALB-DNS'

  LoadBalancerURL:
    Description: URL of the Uranai API
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'

  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPC-ID'

  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub '${AWS::StackName}-ASG-Name'
